<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LooksMax AI</title>
    <style>
        :root {
            --bg: #000;
            --card: #111;
            --text: #fff;
            --sub: #999;
            --gold: #d4af37;
            --green: #22c55e;
            --red: #ef4444;
            --border: #222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100dvh;
            line-height: 1.5;
        }
        .app { max-width: 500px; margin: 0 auto; padding: 20px; padding-bottom: 40px; }

        /* HEADER */
        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 0; margin-bottom: 24px;
        }
        .logo-icon { font-size: 2.5rem; }
        .logo-text h1 { font-size: 1.4rem; font-weight: 800; color: #d4af37; letter-spacing: 1px; }
        .logo-text span { font-size: 0.7rem; color: #999; letter-spacing: 2px; }

        /* SCORE */
        .score-card {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 24px; text-align: center; margin-bottom: 24px;
        }
        .score-big { font-size: 4rem; font-weight: 800; color: #d4af37; line-height: 1; }
        .score-label { font-size: 0.8rem; color: #999; letter-spacing: 2px; text-transform: uppercase; margin: 8px 0; }
        .score-streak { font-size: 0.8rem; color: #d4af37; }

        /* MAIN BUTTONS */
        .main-btns { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .main-btn {
            display: flex; align-items: center; gap: 16px;
            background: #111; border: 1px solid #222; border-radius: 16px;
            padding: 20px; cursor: pointer; transition: 0.2s; text-align: left;
            font-family: inherit; color: #fff; width: 100%; font-size: inherit;
        }
        .main-btn:active { transform: scale(0.98); border-color: #d4af37; }
        .main-btn .icon { font-size: 2.5rem; flex-shrink: 0; }
        .main-btn .info h3 { font-size: 1rem; font-weight: 700; }
        .main-btn .info p { font-size: 0.75rem; color: #999; margin-top: 2px; }
        .main-btn.gold { border-color: #d4af37; background: #1a1a0a; }

        /* CARDS */
        .card {
            background: #111; border: 1px solid #222; border-radius: 16px;
            padding: 20px; margin: 16px 0;
        }
        .card h3 { font-size: 0.9rem; color: #d4af37; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

        /* UPLOAD */
        .upload-box {
            border: 2px dashed #333; border-radius: 16px; padding: 40px 20px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .upload-box:active { border-color: #d4af37; }
        .upload-box img { max-width: 100%; max-height: 250px; border-radius: 12px; margin-top: 8px; }
        .upload-icon { font-size: 3rem; }

        /* BUTTONS */
        .btn {
            width: 100%; padding: 16px; border-radius: 30px; border: none;
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
            font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-gold { background: #d4af37; color: #000; }
        .btn-outline { background: transparent; border: 1px solid #d4af37; color: #d4af37; margin-top: 8px; }
        .btn-red { background: #ef4444; color: #fff; }

        /* AI RESPONSE */
        .ai-box {
            background: #0a0a0a; border: 1px solid #d4af37; border-radius: 16px;
            padding: 16px; margin: 12px 0; font-size: 0.85rem; line-height: 1.7;
            max-height: 400px; overflow-y: auto;
        }
        .spinner {
            display: inline-block; width: 30px; height: 30px;
            border: 3px solid #222; border-top-color: #d4af37;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TRACKER */
        .track-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .track-item {
            background: #0a0a0a; border: 1px solid #222; border-radius: 12px;
            padding: 14px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .track-item:active { transform: scale(0.95); }
        .track-item.done { border-color: #22c55e; background: rgba(34,197,94,0.05); }
        .track-emoji { font-size: 1.8rem; }
        .track-name { font-size: 0.65rem; color: #999; text-transform: uppercase; margin-top: 4px; }
        .track-val { font-size: 0.7rem; color: #fff; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #d4af37; color: #000; padding: 12px 24px; border-radius: 25px;
            font-weight: 700; font-size: 0.85rem; z-index: 999;
            animation: pop 0.3s ease, fade 0.5s 2s forwards;
            max-width: 90%; text-align: center;
        }
        @keyframes pop { from { transform: translate(-50%,20px); opacity: 0; } to { transform: translate(-50%,0); opacity: 1; } }
        @keyframes fade { to { opacity: 0; } }

        /* ONBOARDING */
        .onboarding {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .onboarding-card {
            background: #111; border: 1px solid #d4af37; border-radius: 24px;
            padding: 30px; width: 100%; max-width: 400px; text-align: center;
        }
        .onboarding-card h2 { color: #d4af37; font-size: 1.3rem; margin-bottom: 8px; }
        .onboarding-card p { color: #999; font-size: 0.85rem; margin-bottom: 20px; }
        .step { display: flex; align-items: center; gap: 12px; text-align: left; margin: 12px 0; }
        .step-num {
            width: 32px; height: 32px; border-radius: 50%; background: #d4af37;
            color: #000; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.9rem; flex-shrink: 0;
        }
        .step-text { font-size: 0.8rem; color: #ccc; }

        /* INPUT */
        input, textarea {
            width: 100%; background: #0a0a0a; border: 1px solid #222;
            border-radius: 12px; padding: 14px; color: #fff; font-family: inherit;
            font-size: 0.9rem; margin: 8px 0; outline: none; -webkit-appearance: none;
        }
        input:focus, textarea:focus { border-color: #d4af37; }
        textarea { min-height: 80px; resize: vertical; }

        /* Streak dots */
        .streak-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
        .sdot {
            width: 28px; height: 28px; border-radius: 50%; background: #0a0a0a;
            border: 1px solid #222; display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 700;
        }
        .sdot.on { background: #d4af37; border-color: #d4af37; color: #000; }
        .sdot.today { border-color: #d4af37; box-shadow: 0 0 10px rgba(212,175,55,0.4); }
    </style>
</head>
<body>
    <div class="app" id="app"></div>
    <div id="toasts"></div>
    <div id="onboardingContainer"></div>

    <script>
        // ============ CONFIG ============
        const API_KEY = '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';
        const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        const MODEL = 'llama-3.2-90b-vision-preview';

        // ============ STATE ============
        let S = {
            tab: 'home',
            score: 50,
            streak: [],
            lastDate: '',
            stats: { sleep: 7, water: 8, workout: 1, skincare: 1, mewing: 1, posture: 1, nutrition: 3, sun: 1 },
            onboarded: false
        };

        // ============ STORAGE ============
        function load() {
            try {
                let s = localStorage.getItem('lmx_easy');
                if (s) { let p = JSON.parse(s);
                    S = { ...S, ...p }; }
                let t = new Date().toDateString();
                if (S.lastDate !== t) {
                    S.stats = { sleep: 0, water: 0, workout: 0, skincare: 0, mewing: 0, posture: 0, nutrition: 0, sun: 0 };
                    S.lastDate = t;
                }
            } catch (e) {}
            calcScore();
        }

        function save() {
            S.lastDate = new Date().toDateString();
            localStorage.setItem('lmx_easy', JSON.stringify(S));
            calcScore();
        }

        function calcScore() {
            let sc = 50,
                s = S.stats;
            if (s.sleep >= 7) sc += 15;
            else if (s.sleep >= 6) sc += 8;
            if (s.water >= 8) sc += 10;
            else if (s.water >= 5) sc += 5;
            if (s.workout) sc += 10;
            if (s.skincare) sc += 8;
            if (s.mewing) sc += 3;
            if (s.posture) sc += 3;
            if (s.nutrition >= 3) sc += 8;
            if (s.sun) sc += 3;
            if (S.streak.length >= 30) sc += 10;
            else if (S.streak.length >= 14) sc += 7;
            else if (S.streak.length >= 7) sc += 4;
            S.score = Math.min(100, Math.max(0, Math.round(sc)));
        }

        function updateStreak() {
            let t = new Date().toDateString();
            if (!S.streak.includes(t)) { S.streak.push(t); if (S.streak.length > 90) S.streak = S.streak.slice(-90); }
        }

        function toast(m) {
            let c = document.getElementById('toasts');
            let t = document.createElement('div');
            t.className = 'toast';
            t.textContent = m;
            c.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 2500);
        }

        // ============ AI CALL ============
        async function callAI(prompt, img = null) {
            let msgs = [];
            if (img) {
                msgs.push({
                    role: 'user',
                    content: [
                        { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${img}`, detail: 'high' } },
                        { type: 'text', text: prompt }
                    ]
                });
            } else {
                msgs.push({ role: 'user', content: prompt });
            }
            let r = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: MODEL, messages: msgs, max_tokens: 1000, temperature: 0.7 })
            });
            if (!r.ok) { let e = await r.json();
                throw new Error(e.error?.message || 'API Error'); }
            let d = await r.json();
            return d.choices[0].message.content;
        }

        // ============ IMAGE COMPRESS ============
        function compressImg(file) {
            return new Promise(r => {
                let reader = new FileReader();
                reader.onload = e => {
                    let img = new Image();
                    img.onload = () => {
                        let c = document.createElement('canvas');
                        let w = img.width,
                            h = img.height;
                        if (w > 800) { h = (800 / w) * h;
                            w = 800; }
                        c.width = w;
                        c.height = h;
                        let ctx = c.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        let b64 = c.toDataURL('image/jpeg', 0.8).split(',')[1];
                        r({ b64, url: c.toDataURL('image/jpeg', 0.8) });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // ============ ANALYZE ============
        async function analyzeFace(file) {
            let r = document.getElementById('aiRes');
            r.innerHTML =
                `<div style="text-align:center;padding:20px"><div class="spinner"></div><p style="color:#999;margin-top:8px">AI analyserer dit ansigt...</p></div>`;
            r.style.display = 'block';
            try {
                let { b64, url } = await compressImg(file);
                document.querySelector('.upload-box').innerHTML = `<img src="${url}">`;
                let prompt =
                    `Du er en EKSPERT i mandlig looksmaxing og ansigtsanalyse. Analyser dette billede GRUNDIGT på DANSK. Returnér KUN dette JSON-format:
{
  "rating": [1-10],
  "symmetri": [1-10],
  "hud": [1-10],
  "kæbelinje": [1-10],
  "øjne": [1-10],
  "hår": [1-10],
  "harmoni": [1-10],
  "styrker": ["3 styrker"],
  "forbedringer": ["3 forbedringsområder"],
  "tips": ["3 konkrete tips med specifikke handlinger"],
  "potentiale": [1-10],
  "summary": "2-3 motiverende sætninger på dansk"
}
Vær ÆRLIG, DIREKTE og KONSTRUKTIV. Brug DANSK sprog.`;
                let res = await callAI(prompt, b64);
                let analysis;
                try { let m = res.match(/\{[\s\S]*\}/); if (m) analysis = JSON.parse(m[0]);
                    else throw new Error('No JSON'); } catch (e) { r.innerHTML =
                        `<div class="ai-box">${res.replace(/\n/g,'<br>')}</div>`; return; }
                let stars = '⭐'.repeat(Math.round(analysis.rating));
                r.innerHTML = `<div class="ai-box">
<div style="text-align:center;margin-bottom:16px">
<div style="font-size:2.5rem;color:#d4af37;font-weight:800">${analysis.rating}/10</div>
<div style="font-size:1.3rem">${stars}</div>
<p style="color:#999;font-size:0.7rem">Samlet vurdering</p>
</div>
${['symmetri','hud','kæbelinje','øjne','hår','harmoni'].map(k=>`
<div style="display:flex;align-items:center;gap:8px;margin:6px 0;font-size:0.75rem">
<span style="min-width:65px;color:#999">${k.charAt(0).toUpperCase()+k.slice(1)}</span>
<div style="flex:1;height:8px;background:#222;border-radius:4px;overflow:hidden">
<div style="height:100%;background:#d4af37;border-radius:4px;width:${analysis[k]*10}%"></div>
</div>
<span style="color:#fff;font-weight:700">${analysis[k]}/10</span>
</div>`).join('')}
<div style="margin-top:12px">
<strong style="color:#22c55e">💪 Styrker:</strong><br>${analysis.styrker.map(s=>'• '+s).join('<br>')}<br><br>
<strong style="color:#ef4444">📈 Forbedringer:</strong><br>${analysis.forbedringer.map(i=>'• '+i).join('<br>')}<br><br>
<strong style="color:#d4af37">🎯 Konkrete tips:</strong><br>${analysis.tips.map(t=>'• '+t).join('<br>')}<br><br>
<strong>🚀 Potentiale:</strong> ${analysis.potentiale}/10<br>
<i style="color:#999">${analysis.summary}</i>
</div></div>`;
                toast('✅ Analyse færdig!');
            } catch (e) { r.innerHTML =
                    `<div class="ai-box" style="border-color:#ef4444;text-align:center"><p style="color:#ef4444">❌ ${e.message}</p></div>`; }
        }

        // ============ COACH ============
        async function getCoach() {
            let r = document.getElementById('coachRes');
            r.innerHTML =
                `<div style="text-align:center;padding:20px"><div class="spinner"></div><p style="color:#999;margin-top:8px">Din personlige coach tænker...</p></div>`;
            r.style.display = 'block';
            try {
                let s = S.stats;
                let prompt =
                    `Du er en personlig looksmaxing COACH. Giv en DETALJERET, PERSONLIG analyse på DANSK baseret på:

DAGENS DATA:
- Søvn: ${s.sleep}t (optimalt: 7-9t)
- Vand: ${s.water} glas (optimalt: 8-12 glas)
- Træning: ${s.workout?'✅':'❌'} (optimalt: 4-5x/uge)
- Hudpleje: ${s.skincare?'✅':'❌'} (optimalt: morgen+aften)
- Mewing: ${s.mewing?'✅':'❌'}
- Holdning: ${s.posture?'✅':'❌'}
- Ernæring: ${s.nutrition}/5 måltider
- SPF: ${s.sun?'✅':'❌'}
- Glow Score: ${S.score}/100
- Streak: ${S.streak.length} dage

SVAR MED (på dansk, brug emojis):
1. Motiverende personlig besked
2. PRÆCISE tal for hvad jeg skal nå i morgen (søvn, vand osv.)
3. 3 konkrete handlinger til i morgen
4. Hvad jeg gør godt
5. Hvad jeg SKAL forbedre nu`;
                let res = await callAI(prompt);
                r.innerHTML = `<div class="ai-box"><strong style="color:#d4af37">🤖 Personlig Coach</strong><br><br>${res.replace(/\n/g,'<br>')}</div>`;
            } catch (e) { r.innerHTML =
                    `<div class="ai-box" style="border-color:#ef4444">❌ ${e.message}</div>`; }
        }

        // ============ ONBOARDING ============
        function showOnboarding() {
            let c = document.getElementById('onboardingContainer');
            c.innerHTML = `
<div class="onboarding" id="onboard">
<div class="onboarding-card">
<div style="font-size:4rem">🚀</div>
<h2>Velkommen til LooksMax AI!</h2>
<p>Din personlige AI-coach til at maksimere dit udseende</p>
<div class="step"><div class="step-num">1</div><div class="step-text"><strong>Analyser dit ansigt</strong><br>Tag et billede og få en komplet AI-vurdering</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text"><strong>Følg dine daglige mål</strong><br>Søvn, vand, træning, hudpleje og meget mere</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text"><strong>Få personlig coaching</strong><br>AI'en giver dig PRÆCISE råd hver dag</div></div>
<button class="btn btn-gold" style="margin-top:20px" onclick="finishOnboarding()">✨ Start Nu!</button>
</div></div>`;
        }

        function finishOnboarding() {
            S.onboarded = true;
            save();
            document.getElementById('onboardingContainer').innerHTML = '';
            toast('🚀 Lad os komme i gang!');
            render();
        }

        // ============ RENDER ============
        function render() {
            let a = document.getElementById('app');
            let ds = new Date().toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'short' });
            let sn = '';
            if (S.streak.length >= 7) sn = ' 🔥';
            if (S.streak.length >= 30) sn = ' 👑';

            a.innerHTML = `
<div class="header">
<div class="logo-icon">🦁</div>
<div class="logo-text"><h1>LooksMax AI</h1><span>${ds}</span></div>
</div>

<div class="score-card">
<div class="score-big">${S.score}</div>
<div class="score-label">Glow Score</div>
<div class="score-streak">${S.streak.length} dages streak${sn}</div>
</div>

<div class="main-btns">
<button class="main-btn gold" onclick="switchTab('analyze')">
<span class="icon">🤖</span>
<div class="info"><h3>AI Ansigtsanalyse</h3><p>Tag et billede og få en komplet vurdering</p></div>
</button>
<button class="main-btn" onclick="switchTab('coach')">
<span class="icon">💬</span>
<div class="info"><h3>Personlig Coach</h3><p>Få præcise råd baseret på din daglige data</p></div>
</button>
<button class="main-btn" onclick="switchTab('tracker')">
<span class="icon">✅</span>
<div class="info"><h3>Dagens Tracker</h3><p>Log din søvn, vand, træning og meget mere</p></div>
</button>
</div>

<div id="tabContent"></div>
`;
            renderTab();
        }

        function switchTab(t) {
            S.tab = t;
            render();
            window.scrollTo({ top: document.getElementById('tabContent').offsetTop - 20, behavior: 'smooth' });
        }

        function renderTab() {
            let c = document.getElementById('tabContent');
            if (!c) return;

            if (S.tab === 'analyze') {
                c.innerHTML = `
<div class="card">
<h3>🤖 AI Ansigtsanalyse</h3>
<div class="upload-box" id="uploadBox" onclick="document.getElementById('fileIn').click()">
<div class="upload-icon">📸</div>
<p style="color:#999">Tryk for at tage et billede</p>
<p style="color:#555;font-size:0.7rem;margin-top:4px">Tag et frontalt selfie i god belysning</p>
</div>
<input type="file" id="fileIn" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)">
<div id="aiRes" style="display:none"></div>
<button class="btn btn-outline" style="margin-top:12px" onclick="switchTab('home')">⬅ Tilbage</button>
</div>`;
            } else if (S.tab === 'coach') {
                c.innerHTML = `
<div class="card">
<h3>💬 Personlig Coach</h3>
<p style="color:#999;margin-bottom:12px;font-size:0.85rem">Få PRÆCISE anbefalinger baseret på din tracker-data</p>
<button class="btn btn-gold" onclick="getCoach()">🤖 Få Coach-råd nu</button>
<div id="coachRes" style="margin-top:12px"></div>
<button class="btn btn-outline" style="margin-top:12px" onclick="switchTab('home')">⬅ Tilbage</button>
</div>`;
            } else if (S.tab === 'tracker') {
                c.innerHTML = `
<div class="card">
<h3>✅ Dagens Tracker</h3>
<div style="display:flex;flex-direction:column;gap:10px">
<div style="display:flex;justify-content:space-between;align-items:center">
<span>😴 Søvn</span>
<input type="number" id="sl" value="${S.stats.sleep}" min="0" max="24" style="width:70px;text-align:center;background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:10px;color:#fff;font-size:0.9rem;text-align:center"> timer
</div>
<div style="display:flex;justify-content:space-between;align-items:center">
<span>💧 Vand</span>
<input type="number" id="wa" value="${S.stats.water}" min="0" max="20" style="width:70px;text-align:center;background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:10px;color:#fff;font-size:0.9rem;text-align:center"> glas
</div>
<div style="display:flex;justify-content:space-between;align-items:center">
<span>🥗 Ernæring</span>
<input type="range" id="nu" value="${S.stats.nutrition}" min="0" max="5" style="width:100px" oninput="document.getElementById('nuv').textContent=this.value">
<span id="nuv" style="font-weight:700;color:#d4af37">${S.stats.nutrition}</span>/5
</div>
</div>
</div>
<div class="card">
<h3>Afkrydsning</h3>
${[
['🏋️ Træning (4-5x/uge)','workout'],
['🧴 Hudpleje (rens+fugt)','skincare'],
['👅 Mewing (tunge i ganen)','mewing'],
['🧍 God kropsholdning','posture'],
['☀️ Solbeskyttelse (SPF)','sun']
].map(([l,k])=>`
<label style="display:flex;align-items:center;gap:10px;padding:10px;background:#0a0a0a;border-radius:10px;margin:6px 0;cursor:pointer">
<input type="checkbox" ${S.stats[k]?'checked':''} id="cb_${k}" style="width:20px;height:20px;accent-color:#d4af37">
<span style="font-size:0.8rem">${l}</span>
</label>`).join('')}
</div>
<button class="btn btn-gold" onclick="saveTracker()">✅ Gem dagens data</button>
<button class="btn btn-outline" style="margin-top:8px" onclick="switchTab('home')">⬅ Tilbage</button>
</div>`;
            }
        }

        function handleFile(e) {
            let f = e.target.files[0];
            if (!f) return;
            if (f.size > 10 * 1024 * 1024) { toast('❌ Billedet er for stort (max 10MB)'); return; }
            analyzeFace(f);
        }

        function saveTracker() {
            S.stats.sleep = parseInt(document.getElementById('sl')?.value) || 0;
            S.stats.water = parseInt(document.getElementById('wa')?.value) || 0;
            S.stats.nutrition = parseInt(document.getElementById('nu')?.value) || 0;
            ['workout', 'skincare', 'mewing', 'posture', 'sun'].forEach(k => {
                S.stats[k] = document.getElementById('cb_' + k)?.checked ? 1 : 0;
            });
            updateStreak();
            save();
            toast('✅ Gemt! Godt gået! 🔥');
            switchTab('home');
        }

        // ============ INIT ============
        load();
        if (!S.onboarded) {
            showOnboarding();
        } else {
            render();
        }
    </script>
</body>
</html>
