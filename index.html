<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LooksMax AI</title>
    <style>
        :root{--bg:#000;--card:#111;--text:#fff;--sub:#999;--gold:#d4af37;--green:#22c55e;--red:#ef4444;--border:#222}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#000;color:#fff;min-height:100dvh;line-height:1.5}
        .app{max-width:500px;margin:0 auto;padding:20px;padding-bottom:40px}
        .header{display:flex;align-items:center;gap:12px;padding:16px 0;margin-bottom:24px}
        .logo-icon{font-size:2.5rem}
        .logo-text h1{font-size:1.4rem;font-weight:800;color:#d4af37;letter-spacing:1px}
        .logo-text span{font-size:0.7rem;color:#999;letter-spacing:2px}
        .score-card{background:#111;border:1px solid #222;border-radius:20px;padding:24px;text-align:center;margin-bottom:24px}
        .score-big{font-size:4rem;font-weight:800;color:#d4af37;line-height:1}
        .score-label{font-size:0.8rem;color:#999;letter-spacing:2px;text-transform:uppercase;margin:8px 0}
        .score-streak{font-size:0.8rem;color:#d4af37}
        .main-btns{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
        .main-btn{display:flex;align-items:center;gap:16px;background:#111;border:1px solid #222;border-radius:16px;padding:20px;cursor:pointer;transition:0.2s;text-align:left;font-family:inherit;color:#fff;width:100%;font-size:inherit}
        .main-btn:active{transform:scale(0.98);border-color:#d4af37}
        .main-btn .icon{font-size:2.5rem;flex-shrink:0}
        .main-btn .info h3{font-size:1rem;font-weight:700}
        .main-btn .info p{font-size:0.75rem;color:#999;margin-top:2px}
        .main-btn.gold{border-color:#d4af37;background:#1a1a0a}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:20px;margin:16px 0}
        .card h3{font-size:0.9rem;color:#d4af37;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
        .upload-box{border:2px dashed #333;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:0.3s}
        .upload-box:active{border-color:#d4af37}
        .upload-box img{max-width:100%;max-height:250px;border-radius:12px;margin-top:8px}
        .upload-icon{font-size:3rem}
        .btn{width:100%;padding:16px;border-radius:30px;border:none;font-weight:700;font-size:0.9rem;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:0.5px;transition:0.2s}
        .btn:active{transform:scale(0.97)}
        .btn-gold{background:#d4af37;color:#000}
        .btn-outline{background:transparent;border:1px solid #d4af37;color:#d4af37;margin-top:8px}
        .btn-red{background:#ef4444;color:#fff}
        .ai-box{background:#0a0a0a;border:1px solid #d4af37;border-radius:16px;padding:16px;margin:12px 0;font-size:0.85rem;line-height:1.7;max-height:400px;overflow-y:auto}
        .spinner{display:inline-block;width:30px;height:30px;border:3px solid #222;border-top-color:#d4af37;border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .tracker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .track-item{background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:14px;text-align:center;transition:0.2s}
        .track-item:active{transform:scale(0.95)}
        .track-item.done{border-color:#22c55e;background:rgba(34,197,94,0.05)}
        .track-emoji{font-size:1.8rem}
        .track-name{font-size:0.65rem;color:#999;text-transform:uppercase;margin-top:4px}
        .track-val{font-size:0.7rem;color:#fff}
        .streak-dots{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}
        .sdot{width:28px;height:28px;border-radius:50%;background:#0a0a0a;border:1px solid #222;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700}
        .sdot.on{background:#d4af37;border-color:#d4af37;color:#000}
        .sdot.today{border-color:#d4af37;box-shadow:0 0 10px rgba(212,175,55,0.5)}
        .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#d4af37;color:#000;padding:12px 24px;border-radius:25px;font-weight:700;font-size:0.85rem;z-index:999;animation:pop 0.3s ease,fade 0.5s 2s forwards;max-width:90%;text-align:center}
        @keyframes pop{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
        @keyframes fade{to{opacity:0}}
        .onboarding{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
        .onboarding-card{background:#111;border:1px solid #d4af37;border-radius:24px;padding:30px;width:100%;max-width:400px;text-align:center}
        .onboarding-card h2{color:#d4af37;font-size:1.3rem;margin-bottom:8px}
        .onboarding-card p{color:#999;font-size:0.85rem;margin-bottom:20px}
        .step{display:flex;align-items:center;gap:12px;text-align:left;margin:12px 0}
        .step-num{width:32px;height:32px;border-radius:50%;background:#d4af37;color:#000;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;flex-shrink:0}
        .step-text{font-size:0.8rem;color:#ccc}
        input,textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:14px;color:#fff;font-family:inherit;font-size:0.9rem;margin:8px 0;outline:0;-webkit-appearance:none}
        input:focus,textarea:focus{border-color:#d4af37}
        textarea{min-height:80px;resize:vertical}
    </style>
</head>
<body>
    <div class="app" id="app"></div>
    <div id="toasts"></div>
    <div id="onboardingContainer"></div>

    <script>
        const API_URL='https://api.groq.com/openai/v1/chat/completions';
        const MODEL='meta-llama/llama-4-scout-17b-16e-instruct';

        let S={tab:'home',score:50,streak:[],lastDate:'',stats:{sleep:0,water:0,workout:0,skincare:0,mewing:0,posture:0,nutrition:0,sun:0},onboarded:false,apiKey:'',faceAnalysis:null,faceImage:null,hairProfile:{type:'',thickness:'',texture:'',lengthCm:'',concerns:'',preferences:''},products:{face:[],hair:[]},progressGallery:[],extraObservations:'',hairInspo:[]};

        function load(){
            try{
                let s=localStorage.getItem('lmx_stable_final');
                if(s){let p=JSON.parse(s);S={...S,...p}}
                if(!Array.isArray(S.streak))S.streak=[];
                if(!S.products)S.products={face:[],hair:[]};
                if(!Array.isArray(S.products.face))S.products.face=[];
                if(!Array.isArray(S.products.hair))S.products.hair=[];
                if(!Array.isArray(S.progressGallery))S.progressGallery=[];
                if(!Array.isArray(S.hairInspo))S.hairInspo=[];
                let k=localStorage.getItem('lmx_apikey_final');
                if(k)S.apiKey=k;
                let t=new Date().toDateString();
                if(S.lastDate!==t){S.stats={sleep:0,water:0,workout:0,skincare:0,mewing:0,posture:0,nutrition:0,sun:0};S.lastDate=t}
            }catch(e){S={tab:'home',score:50,streak:[],lastDate:'',stats:{sleep:0,water:0,workout:0,skincare:0,mewing:0,posture:0,nutrition:0,sun:0},onboarded:false,apiKey:'',faceAnalysis:null,faceImage:null,hairProfile:{type:'',thickness:'',texture:'',lengthCm:'',concerns:'',preferences:''},products:{face:[],hair:[]},progressGallery:[],extraObservations:'',hairInspo:[]}}
            calcScore();
        }

        function save(){
            S.lastDate=new Date().toDateString();
            let ts=JSON.parse(JSON.stringify(S));delete ts.apiKey;
            localStorage.setItem('lmx_stable_final',JSON.stringify(ts));
            if(S.apiKey)localStorage.setItem('lmx_apikey_final',S.apiKey);
            calcScore();
        }

        function getAPIKey(){if(!S.apiKey)S.apiKey=localStorage.getItem('lmx_apikey_final')||'';return S.apiKey}
        function setAPIKey(k){S.apiKey=k;localStorage.setItem('lmx_apikey_final',k)}

        function calcScore(){
            let sc=50,s=S.stats;
            if(s.sleep>=7)sc+=15;else if(s.sleep>=6)sc+=8;
            if(s.water>=8)sc+=10;else if(s.water>=5)sc+=5;
            if(s.workout)sc+=10;if(s.skincare)sc+=8;if(s.mewing)sc+=3;if(s.posture)sc+=3;
            if(s.nutrition>=3)sc+=8;if(s.sun)sc+=3;
            let sl=Array.isArray(S.streak)?S.streak.length:0;
            if(sl>=30)sc+=10;else if(sl>=14)sc+=7;else if(sl>=7)sc+=4;
            S.score=Math.min(100,Math.max(0,Math.round(sc)));
        }

        function updateStreak(){let t=new Date().toDateString();if(!Array.isArray(S.streak))S.streak=[];if(!S.streak.includes(t)){S.streak.push(t);if(S.streak.length>90)S.streak=S.streak.slice(-90)}}

        function toast(m){let c=document.getElementById('toasts');let t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove()},2500)}

        async function callAI(prompt,img=null){
            let key=getAPIKey();if(!key){showAPISetup();throw new Error('Indtast API-nøgle')}
            let msgs=[];
            if(img){msgs.push({role:'user',content:[{type:'image_url',image_url:{url:'data:image/jpeg;base64,'+img,detail:'high'}},{type:'text',text:prompt}])}
            }else{msgs.push({role:'user',content:prompt})}
            let r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:MODEL,messages:msgs,max_tokens:1000,temperature:0.7})});
            if(!r.ok){let e=await r.json();throw new Error(e.error?.message||'API-fejl')}
            let d=await r.json();return d.choices[0].message.content;
        }

        function compressImg(file){return new Promise(r=>{let reader=new FileReader();reader.onload=e=>{let img=new Image();img.onload=()=>{let c=document.createElement('canvas');let w=img.width,h=img.height;if(w>800){h=(800/w)*h;w=800}c.width=w;c.height=h;let ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);let b64=c.toDataURL('image/jpeg',0.9).split(',')[1];r({b64,url:c.toDataURL('image/jpeg',0.9)})};img.src=e.target.result};reader.readAsDataURL(file)})}

        let camStream=null,scanStep=0,scanImgs=[];

        async function startScan(){try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:800},height:{ideal:800}}});scanStep=0;scanImgs=[];showCamUI()}catch(e){toast('❌ Kamera ikke tilgængeligt')}}

        function showCamUI(){
            let o=document.createElement('div');o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center';
            o.id='camUI';
            o.innerHTML='<video id="camVid" autoplay playsinline style="width:100%;max-height:55vh;object-fit:cover;border-radius:20px;transform:scaleX(-1)"></video><div style="font-size:1.1rem;font-weight:700;color:#d4af37;padding:18px;text-align:center" id="camInst">1/5 • Kig LIGE FREM</div><button class="btn btn-gold" style="width:80%;margin-top:12px" id="camBtn" onclick="captureScan()">📸 Tag billede</button><button class="btn btn-outline" style="width:80%;margin-top:6px" onclick="stopCam()">Annuller</button>';
            document.body.appendChild(o);document.getElementById('camVid').srcObject=camStream;
        }

        function captureScan(){
            try{
                let v=document.getElementById('camVid');if(!v)return;
                let c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
                let ctx=c.getContext('2d');ctx.translate(c.width,0);ctx.scale(-1,1);ctx.drawImage(v,0,0,c.width,c.height);
                scanImgs.push(c.toDataURL('image/jpeg',0.9));
                let inst=['1/5 • Kig LIGE FREM 😐','2/5 • Drej til DIN HØJRE ➡️','3/5 • Drej til DIN VENSTRE ⬅️','4/5 • Løft hagen OP ⬆️','5/5 • Sænk hagen NED ⬇️'];
                scanStep++;
                if(scanStep<5){document.getElementById('camInst').textContent=inst[scanStep];document.getElementById('camBtn').textContent='📸 Tag ('+(scanStep+1)+'/5)'}
                else{stopCam();showExtraObs()}
            }catch(e){stopCam()}
        }

        function stopCam(){try{if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}}catch(e){}let u=document.getElementById('camUI');if(u)u.remove()}

        function showExtraObs(){
            let o=document.createElement('div');
            o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px';
            o.id='obsOverlay';
            o.innerHTML='<div class="card" style="max-width:400px;width:100%"><h3 style="color:#d4af37;text-align:center;">Noget AI skal vide?</h3><div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:10px">'+['Acne','Bumser','Blackheads','Ar','Rynker','Morke rander','Skaegvaekst','Skael','Tor hud','Fedtet hud'].map(t=>'<span class="tag" onclick="this.classList.toggle(\'sel\')" style="display:inline-block;padding:8px 14px;border-radius:18px;font-size:0.65rem;margin:2px;cursor:pointer;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05)">'+t+'</span>').join('')+'</div><input id="extraobs" placeholder="Eller skriv selv..." style="text-align:center;width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:14px;color:#fff;font-size:0.9rem;margin:8px 0;outline:0"><button class="btn btn-gold" style="margin-top:10px" onclick="finishObs()">Start AI-analyse</button><button class="btn btn-outline" style="margin-top:6px" onclick="skipObs()">Spring over</button></div>';
            document.body.appendChild(o);
        }

        function finishObs(){
            try{let tags=[];document.querySelectorAll('#obsOverlay .tag.sel').forEach(t=>tags.push(t.textContent));S.extraObservations=[...tags,document.getElementById('extraobs')?.value||''].filter(Boolean).join(', ')}catch(e){S.extraObservations=''}
            let o=document.getElementById('obsOverlay');if(o)o.remove();processScan();
        }

        function skipObs(){S.extraObservations='';let o=document.getElementById('obsOverlay');if(o)o.remove();processScan()}

        async function processScan(){
            S.faceImage=scanImgs[0];let r=document.getElementById('aiRes');if(!r)return;
            r.innerHTML='<div style="text-align:center;padding:25px"><div class="spinner"></div><p style="color:#999;margin-top:10px">AI analyserer 5 vinkler...</p></div>';r.style.display='block';
            try{
                let frontB64=scanImgs[0].split(',')[1];
                let extra=S.extraObservations?'\nBRUGER NÆVNT: '+S.extraObservations:'';
                let prompt='Ekspert i ansigtsanalyse. 5 billeder.'+extra+' Analysér på DANSK. Returnér KUN JSON:{"rating":1-10,"symmetri":1-10,"hud":1-10,"kæbelinje":1-10,"øjne":1-10,"hår":1-10,"harmoni":1-10,"styrker":["s1","s2","s3"],"forbedringer":["f1","f2","f3"],"tips":["t1","t2","t3"],"potentiale":1-10,"summary":"kort","optimalSøvn":"timer","optimalVand":"glas","hudtype":"type","ansigtsform":"form","prognose":"tekst"}';
                let res=await callAI(prompt,frontB64);let analysis;
                try{let m=res.match(/\{[\s\S]*\}/);if(m)analysis=JSON.parse(m[0]);else throw new Error('')}catch(e){r.innerHTML='<div class="ai-box">'+res.replace(/\n/g,'<br>')+'</div>';return}
                S.faceAnalysis=analysis;updateStreak();
                let tw=getWeek();if(!Array.isArray(S.progressGallery))S.progressGallery=[];
                if(!S.progressGallery.find(p=>p.week===tw)){S.progressGallery.push({week:tw,date:new Date().toISOString(),image:S.faceImage,score:analysis.rating});if(S.progressGallery.length>52)S.progressGallery.shift()}
                save();
                let stars='⭐'.repeat(Math.round(analysis.rating));
                r.innerHTML='<div class="ai-box"><div style="text-align:center;margin-bottom:14px"><div style="font-size:2.8rem;font-weight:800;color:#d4af37">'+analysis.rating+'/10</div><div style="font-size:1.2rem">'+stars+'</div></div>'+['symmetri','hud','kæbelinje','øjne','hår','harmoni'].map(k=>'<div style="display:flex;align-items:center;gap:8px;margin:5px 0;font-size:0.7rem"><span style="min-width:60px;color:#999">'+k.charAt(0).toUpperCase()+k.slice(1)+'</span><div style="flex:1;height:6px;background:#222;border-radius:3px"><div style="height:100%;background:#d4af37;border-radius:3px;width:'+(analysis[k]*10)+'%"></div></div><span style="font-weight:700">'+analysis[k]+'/10</span></div>').join('')+'<div style="margin-top:12px"><strong style="color:#22c55e">💪 Styrker</strong><br>'+((analysis.styrker||[]).map(s=>'• '+s).join('<br>'))+'<br><br><strong style="color:#ef4444">📈 Forbedringer</strong><br>'+((analysis.forbedringer||[]).map(i=>'• '+i).join('<br>'))+'<br><br><strong style="color:#d4af37">🎯 Tips</strong><br>'+((analysis.tips||[]).map(t=>'• '+t).join('<br>'))+'<br><br><strong>🚀 Potentiale:</strong> '+analysis.potentiale+'/10<br><strong>😴 Søvn:</strong> '+analysis.optimalSøvn+'<br><strong>💧 Vand:</strong> '+analysis.optimalVand+'<br><strong>🧴 Hudtype:</strong> '+analysis.hudtype+'<br><strong>📅 Prognose:</strong> '+analysis.prognose+'</div></div>';
                toast('✅ Analyse færdig!');
            }catch(e){r.innerHTML='<div class="ai-box" style="border-color:#ef4444"><p style="color:#ef4444">❌ '+e.message+'</p></div>'}
        }

        function getWeek(){try{let d=new Date();d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));let y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7)}catch(e){return 1}}

        // ============ API SETUP ============
        function showAPISetup(){
            let o=document.createElement('div');
            o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:5000;display:flex;align-items:center;justify-content:center;padding:20px';
            o.innerHTML='<div class="card" style="max-width:400px;width:100%;text-align:center"><div style="font-size:3rem">🔑</div><h3 style="color:#d4af37;margin:10px 0">Indtast API-nøgle</h3><p style="color:#999;font-size:0.8rem;margin-bottom:14px">Få en gratis nøgle på:<br><strong>console.groq.com/keys</strong></p><input type="password" id="apiKeyInput" placeholder="gsk_..." autocomplete="off" style="text-align:center"><button class="btn btn-gold" style="margin-top:10px" onclick="saveAPIKeyFromModal()">💾 Gem nøgle</button></div>';
            o.addEventListener('click',function(e){if(e.target===o)o.remove()});
            document.body.appendChild(o);
        }

        function saveAPIKeyFromModal(){
            let k=document.getElementById('apiKeyInput')?.value?.trim();
            if(!k||!k.startsWith('gsk_')){toast('❌ Ugyldig nøgle');return}
            setAPIKey(k);S.onboarded=true;save();
            document.querySelectorAll('[style*="z-index:5000"]').forEach(el=>el.remove());
            toast('✅ Nøgle gemt!');render();
        }

        // ============ RENDER ============
        function render(){
            let a=document.getElementById('app');if(!a)return;
            let ds='';try{ds=new Date().toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'short'})}catch(e){ds=''}
            let hasKey=!!getAPIKey();
            if(!hasKey){
                a.innerHTML='<div class="header"><div class="logo-icon">🦁</div><div class="logo-text"><h1>LooksMax AI</h1><span>'+ds+'</span></div></div><div class="card" style="text-align:center"><div style="font-size:3rem">🔑</div><h3>API-nøgle mangler</h3><p style="color:#999;font-size:0.8rem">Få en gratis nøgle på console.groq.com/keys</p><button class="btn btn-gold" onclick="showAPISetup()">🔑 Indtast nøgle</button></div>';
                return;
            }
            let sl=Array.isArray(S.streak)?S.streak.length:0;let sn='';if(sl>=30)sn=' 👑';else if(sl>=7)sn=' 🔥';
            a.innerHTML='<div class="header"><div class="logo-icon">🦁</div><div class="logo-text"><h1>LooksMax AI</h1><span>'+ds+' · 🟢 Online</span></div></div><div class="score-card"><div class="score-big">'+S.score+'</div><div class="score-label">Glow Score</div><div class="score-streak">'+sl+' dage'+sn+'</div></div><div class="main-btns"><button class="main-btn gold" onclick="switchTab(\'scan\')"><span class="icon">📸</span><div class="info"><h3>3D Ansigtsscanning</h3><p>5 vinkler · AI-analyse</p></div></button><button class="main-btn" onclick="switchTab(\'tracker\')"><span class="icon">✅</span><div class="info"><h3>Dagens Tracker</h3><p>Log søvn, vand, træning</p></div></button><button class="main-btn" onclick="switchTab(\'coach\')"><span class="icon">💬</span><div class="info"><h3>Personlig Coach</h3><p>Få præcise råd</p></div></button></div><div id="tabContent"></div>';
            renderTab();
        }

        function switchTab(t){S.tab=t;render();setTimeout(()=>{let el=document.getElementById('tabContent');if(el)el.scrollIntoView({behavior:'smooth'})},100)}

        function renderTab(){
            let c=document.getElementById('tabContent');if(!c)return;
            if(S.tab==='scan')c.innerHTML='<div class="card"><h3>📸 3D Ansigtsscanning</h3><div class="upload-box" id="uploadBox" onclick="document.getElementById(\'fileIn\').click()"><div class="upload-icon">📸</div><p style="color:#999">Tryk for at starte scanning</p></div><input type="file" id="fileIn" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)"><div id="aiRes" style="display:none"></div><button class="btn btn-gold" style="margin-top:10px" onclick="startScan()">🎥 Start kamera-scanning</button><button class="btn btn-outline" onclick="switchTab(\'home\')">⬅ Tilbage</button></div>';
            else if(S.tab==='tracker'){
                let s=S.stats||{};
                c.innerHTML='<div class="card"><h3>✅ Dagens Tracker</h3><button class="btn btn-gold" style="margin-bottom:12px" onclick="aiFillTracker()">🤖 AI auto-udfyld</button><div style="display:flex;flex-direction:column;gap:8px"><div style="display:flex;justify-content:space-between;align-items:center"><span>😴 Søvn</span><input type="number" id="sl" value="'+(s.sleep||0)+'" min="0" max="24" style="width:70px;text-align:center"> timer</div><div style="display:flex;justify-content:space-between;align-items:center"><span>💧 Vand</span><input type="number" id="wa" value="'+(s.water||0)+'" min="0" max="20" style="width:70px;text-align:center"> glas</div></div></div><div class="card"><h3>Afkrydsning</h3>'+[['🏋️ Træning','workout'],['🧴 Hudpleje','skincare'],['👅 Mewing','mewing'],['🧍 Holdning','posture'],['☀️ SPF','sun']].map(([l,k])=>'<label style="display:flex;align-items:center;gap:10px;padding:10px;background:#0a0a0a;border-radius:10px;margin:6px 0;cursor:pointer" onclick="toggleCheck(\''+k+'\')"><div style="width:22px;height:22px;border:2px solid '+(s[k]?'#d4af37':'#444')+';border-radius:6px;display:flex;align-items:center;justify-content:center;background:'+(s[k]?'#d4af37':'transparent')+'">'+(s[k]?'✓':'')+'</div><span style="font-size:0.8rem">'+l+'</span></label>').join('')+'<button class="btn btn-gold" style="margin-top:10px" onclick="saveTracker()">✅ Gem</button></div><button class="btn btn-outline" onclick="switchTab(\'home\')">⬅ Tilbage</button>';
            }else if(S.tab==='coach')c.innerHTML='<div class="card"><h3>💬 Personlig Coach</h3><p style="color:#999;font-size:0.8rem;margin-bottom:10px">'+(S.faceAnalysis?'✅ Kender dit ansigt':'⚠️ Scan først')+'</p><button class="btn btn-gold" onclick="getCoach()">🤖 Få Coach-råd</button><div id="coachRes" style="margin-top:10px"></div><button class="btn btn-outline" onclick="switchTab(\'home\')">⬅ Tilbage</button></div>';
        }

        function handleFile(e){let f=e.target.files[0];if(!f)return;if(f.size>10*1024*1024){toast('❌ For stort');return};analyzeFace(f)}

        async function analyzeFace(file){
            let r=document.getElementById('aiRes');if(!r)return;
            r.innerHTML='<div style="text-align:center;padding:25px"><div class="spinner"></div><p style="color:#999;margin-top:10px">AI analyserer...</p></div>';r.style.display='block';
            try{let{b64,url}=await compressImg(file);document.querySelector('.upload-box').innerHTML='<img src="'+url+'">';let prompt='Ekspert i ansigtsanalyse. Analysér på DANSK. Returnér KUN JSON:{"rating":1-10,"symmetri":1-10,"hud":1-10,"kæbelinje":1-10,"øjne":1-10,"hår":1-10,"harmoni":1-10,"styrker":["s1","s2","s3"],"forbedringer":["f1","f2","f3"],"tips":["t1","t2","t3"],"potentiale":1-10,"summary":"kort","optimalSøvn":"timer","optimalVand":"glas","hudtype":"type","ansigtsform":"form","prognose":"tekst"}';let res=await callAI(prompt,b64);let analysis;try{let m=res.match(/\{[\s\S]*\}/);if(m)analysis=JSON.parse(m[0]);else throw new Error('')}catch(e){r.innerHTML='<div class="ai-box">'+res.replace(/\n/g,'<br>')+'</div>';return}
                S.faceAnalysis=analysis;S.faceImage=url;updateStreak();save();
                let stars='⭐'.repeat(Math.round(analysis.rating));
                r.innerHTML='<div class="ai-box"><div style="text-align:center;margin-bottom:14px"><div style="font-size:2.8rem;font-weight:800;color:#d4af37">'+analysis.rating+'/10</div><div style="font-size:1.2rem">'+stars+'</div></div>'+['symmetri','hud','kæbelinje','øjne','hår','harmoni'].map(k=>'<div style="display:flex;align-items:center;gap:8px;margin:5px 0;font-size:0.7rem"><span style="min-width:60px;color:#999">'+k.charAt(0).toUpperCase()+k.slice(1)+'</span><div style="flex:1;height:6px;background:#222;border-radius:3px"><div style="height:100%;background:#d4af37;border-radius:3px;width:'+(analysis[k]*10)+'%"></div></div><span style="font-weight:700">'+analysis[k]+'/10</span></div>').join('')+'<div style="margin-top:12px"><strong style="color:#22c55e">💪 Styrker</strong><br>'+((analysis.styrker||[]).map(s=>'• '+s).join('<br>'))+'<br><br><strong style="color:#ef4444">📈 Forbedringer</strong><br>'+((analysis.forbedringer||[]).map(i=>'• '+i).join('<br>'))+'<br><br><strong style="color:#d4af37">🎯 Tips</strong><br>'+((analysis.tips||[]).map(t=>'• '+t).join('<br>'))+'<br><br><strong>🚀 Potentiale:</strong> '+analysis.potentiale+'/10<br><strong>😴 Søvn:</strong> '+analysis.optimalSøvn+'<br><strong>💧 Vand:</strong> '+analysis.optimalVand+'<br><strong>🧴 Hudtype:</strong> '+analysis.hudtype+'<br><strong>📅 Prognose:</strong> '+analysis.prognose+'</div></div>';
                toast('✅ Analyse færdig!');
            }catch(e){r.innerHTML='<div class="ai-box" style="border-color:#ef4444"><p style="color:#ef4444">❌ '+e.message+'</p></div>'}
        }

        async function getCoach(){
            let r=document.getElementById('coachRes');if(!r)return;
            r.innerHTML='<div style="text-align:center;padding:25px"><div class="spinner"></div></div>';r.style.display='block';
            try{
                let s=S.stats||{},f=S.faceAnalysis||{};
                let prompt='Du er min personlige LOOKSMAXING COACH. Du kender mit ansigt (Score: '+(f.rating||'?')+'/10). Mine daglige stats: Søvn '+(s.sleep||0)+'t, Vand '+(s.water||0)+' glas, Træning: '+(s.workout?'Ja':'Nej')+', Hudpleje: '+(s.skincare?'Ja':'Nej')+', SPF: '+(s.sun?'Ja':'Nej')+'. Glow Score: '+S.score+'/100. Giv: 1) Motiverende besked 2) PRÆCISE mål i morgen 3) 3 handlinger. Emojis. Dansk.';
                let res=await callAI(prompt,S.faceImage?S.faceImage.split(',')[1]:null);
                r.innerHTML='<div class="ai-box"><strong style="color:#d4af37">🤖 Personlig Coach</strong><br><br>'+res.replace(/\n/g,'<br>')+'</div>';
            }catch(e){r.innerHTML='<div class="ai-box" style="border-color:#ef4444">❌ '+e.message+'</div>'}
        }

        function aiFillTracker(){
            if(!S.faceAnalysis){toast('❌ Scan ansigt først');return}
            S.stats.sleep=parseInt(S.faceAnalysis.optimalSøvn)||8;S.stats.water=parseInt(S.faceAnalysis.optimalVand)||10;
            S.stats.nutrition=4;S.stats.workout=1;S.stats.skincare=1;S.stats.mewing=1;S.stats.posture=1;S.stats.sun=1;
            updateStreak();save();toast('✅ AI har udfyldt optimale værdier!');render();
        }

        function toggleCheck(k){if(!S.stats)S.stats={};S.stats[k]=S.stats[k]?0:1;save();renderTab()}

        function saveTracker(){try{S.stats.sleep=parseInt(document.getElementById('sl')?.value)||0;S.stats.water=parseInt(document.getElementById('wa')?.value)||0;updateStreak();save();toast('✅ Gemt!');switchTab('home')}catch(e){}}

        try{load();if(!getAPIKey()){render();showAPISetup()}else{S.onboarded=true;render()}}catch(e){S={tab:'home',score:50,streak:[],lastDate:'',stats:{sleep:0,water:0,workout:0,skincare:0,mewing:0,posture:0,nutrition:0,sun:0},onboarded:false,apiKey:'',faceAnalysis:null,faceImage:null,hairProfile:{type:'',thickness:'',texture:'',lengthCm:'',concerns:'',preferences:''},products:{face:[],hair:[]},progressGallery:[],extraObservations:'',hairInspo:[]};localStorage.clear();render();showAPISetup()}
    </script>
</body>
</html>
